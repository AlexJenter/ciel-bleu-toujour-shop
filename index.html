<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SHOP | Ciel Bleu Toujours</title>
        <link rel="icon" href="favicon.ico" sizes="any" />
        <link rel="icon" type="image/png" href="favicon.png" sizes="96x96" />
        <link rel="apple-touch-icon" href="apple-touch-icon.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Muli:wght@400;700&display=swap"
            rel="stylesheet"
        />
        <style>
            body {
                padding: 0;
                font-family: "Muli", sans-serif;
            }
            .SprdMain {
                max-width: initial !important;
                h1,
                h2,
                h3,
                h4,
                header {
                    font-family: "Abril Fatface", serif;
                }
            }
            #loader {
                font-family: "Abril Fatface", serif;
            }

            #loader {
                --load-time: 0.5s;
                --fade-duration: 0.7s;
                position: fixed;
                inset: 0;
                z-index: 10;
                background: #2e9fe6;
                color: #fefefe;

                padding: 1em;
                font-size: min(30svh, 25vw);
                text-decoration: none;
                transition:
                    opacity var(--fade-duration) ease var(--load-time),
                    visibility 0s linear
                        calc(var(--fade-duration) + var(--load-time));

                z-index: 1000;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            body:not(:has(#sprd-main)) {
                margin: 0;
                padding: 1em;
                width: 100vw;
                height: 100svh;
                display: flex;
                align-items: center;
            }

            body:has(#sprd-main) #loader {
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
            }
        </style>
    </head>
    <body>
        <div id="myShop"></div>

        <a id="loader" href="https://ciel-bleu-toujours.myspreadshop.ch">
            <span>Ciel</span> <br />
            <span>Bleu</span> <br />
            <span>Toujours</span>
        </a>

        <script>
            var spread_shop_config = {
                shopName: "ciel-bleu-toujours",
                locale: "de_CH",
                prefix: "https://ciel-bleu-toujours.myspreadshop.ch",
                baseId: "myShop",
            };
        </script>

        <script
            type="text/javascript"
            src="https://ciel-bleu-toujours.myspreadshop.ch/shopfiles/shopclient/shopclient.nocache.js"
        ></script>
    </body>
</html>
