<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SHOP | Ciel Bleu Toujours</title>
        <link rel="icon" href="favicon.ico" sizes="any" />
        <link rel="icon" type="image/png" href="favicon.png" sizes="96x96" />
        <link rel="apple-touch-icon" href="apple-touch-icon.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Muli:wght@400;700&display=swap"
            rel="stylesheet"
        />
        <style>
            body {
                padding: 0;
                font-family: "Muli", sans-serif;
                letter-spacing: 0.01em;
            }
            .SprdMain {
                max-width: initial !important;

                footer {
                    max-width: initial !important;
                }

                h1,
                h2,
                h3,
                h4,
                header {
                    font-family: "Abril Fatface", serif;
                }

                @media screen and (min-width: 768px) {
                    .sprd-startpage-teaser__link {
                        min-height: 400px !important;
                    }
                }
            }
            .sprd-nav-link {
                font-size: 21px !important;
            }
            .sprd-info-footer__heading {
                font-size: 2.3rem !important;
                padding: 1em 1rem !important;
            }
            .sprd-info-footer__toggle {
                padding: 0 !important;
            }
            footer::after {
                content: "Ciel Bleu Toujours";
                font-family: "Abril Fatface", serif;
                display: flex;
                justify-content: space-between;
                word-spacing: 3cqi;
                font-size: 11cqi;
                background-color: #000;
                color: #fefefe;
            }
            .sprd-service-footer {
                padding-block: 9rem 3rem !important;
            }
            #loader {
                font-family: "Abril Fatface", serif;
            }

            #loader {
                --load-time: 1.5s;
                --fade-duration: 0.9s;
                position: fixed;
                inset: 0;
                z-index: 2147483647;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                background: #00a3ff;
                color: #fefefe;
                font-size: min(30svh, 22vw);
                line-height: 1;
                text-decoration: none;
                transition:
                    opacity var(--fade-duration) ease var(--load-time),
                    visibility 0s linear
                        calc(var(--fade-duration) + var(--load-time));
            }

            /* Words fade in over the blue when the page first renders */
            #loader span {
                opacity: 1;
                transition: opacity var(--fade-duration) ease;
                transition-delay: calc(0.2s + var(--i, 0) * 0.125s);
            }
            #loader span:nth-of-type(2) {
                --i: 1;
            }
            #loader span:nth-of-type(3) {
                --i: 2;
            }
            @starting-style {
                #loader span {
                    opacity: 0;
                }
            }
            @media (prefers-reduced-motion: reduce) {
                #loader span {
                    transition: none;
                }
            }

            body:not(:has(#sprd-main)) {
                margin: 0;
                padding: 1em;
                width: 100vw;
                height: 100svh;
                display: flex;
                align-items: center;
            }

            body:has(#sprd-main) #loader {
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
            }
        </style>
    </head>
    <body>
        <div id="myShop"></div>

        <a id="loader" href="https://ciel-bleu-toujours.myspreadshop.ch">
            <span>Ciel</span> <br />
            <span>Bleu</span> <br />
            <span>Toujours</span>
        </a>

        <script>
            var spread_shop_config = {
                shopName: "ciel-bleu-toujours",
                locale: "de_CH",
                prefix: "https://ciel-bleu-toujours.myspreadshop.ch",
                baseId: "myShop",
            };
        </script>

        <script
            type="text/javascript"
            src="https://ciel-bleu-toujours.myspreadshop.ch/shopfiles/shopclient/shopclient.nocache.js"
        ></script>
    </body>
</html>
